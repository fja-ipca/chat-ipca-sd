# nginx.conf

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # O teu bloco de servidores corrigido entra aqui dentro:
    server {
        listen 80;
        server_name chat.local;
        # Redireciona todo o tráfego HTTP para HTTPS automaticamente
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name chat.local;

        # Caminho dos certificados dentro do container
        ssl_certificate /etc/nginx/ssl/nginx.crt;
        ssl_certificate_key /etc/nginx/ssl/nginx.key;

        # Melhores práticas de segurança para SSL
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Envia os headers necessários para o Authelia
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-URI $request_uri;
        proxy_set_header X-Forwarded-Ssl on;

        location / {
            proxy_pass http://authelia:9091; 
        }
    }
}