version: '3.8'

services:
  # ==========================================
  # CAMADA DE PERSISTÊNCIA (POSTGRESQL MASTER)
  # ==========================================
  psql_01:
    image: bitnami/postgresql:latest
    container_name: psql_01
    environment:
      - POSTGRESQL_USERNAME=chat_admin          # Usuário padrão do chat
      - POSTGRESQL_PASSWORD=senha_secreta
      - POSTGRESQL_DATABASE=chat_db             # Banco padrão do chat
      - POSTGRESQL_REPLICATION_MODE=master      # Define este nó como o Master
      - POSTGRESQL_REPLICATION_USER=replicador  # Usuário que o Slave usará para copiar os dados
      - POSTGRESQL_REPLICATION_PASSWORD=senha_replicacao
    volumes:
      - psql_master_data:/bitnami/postgresql
      - ./postgres-infra:/docker-entrypoint-initdb.d:ro
    networks:
      - db_net
    restart: always

  # ==========================================
  # CAMADA DE PERSISTÊNCIA (POSTGRESQL SLAVE)
  # ==========================================
  psql_01_rr:
    image: bitnami/postgresql:latest
    container_name: psql_01_rr
    environment:
      - POSTGRESQL_PASSWORD=senha_secreta
      - POSTGRESQL_REPLICATION_MODE=slave       # Define este nó como uma Réplica (Slave)
      - POSTGRESQL_MASTER_HOST=psql_01          # Aponta para o nome do contêiner do Master
      - POSTGRESQL_MASTER_PORT_NUMBER=5432
      - POSTGRESQL_REPLICATION_USER=replicador  # Usa as credenciais que o Master liberou
      - POSTGRESQL_REPLICATION_PASSWORD=senha_replicacao
    volumes:
      - psql_replica_data:/bitnami/postgresql   # Volume próprio para a réplica
    depends_on:
      - psql_01
    networks:
      - db_net
    restart: always

  # ==========================================
  # CAMADA DE BALANCEAMENTO DE DADOS (PGPOOL-II)
  # ==========================================
  pgpool:
    image: bitnami/pgpool:latest
    container_name: pgpool_balancer
    environment:
      - PGPOOL_BACKEND_NODES=0:psql_01:5432,1:psql_01_rr:5432 # Mapeia Master (nó 0) e Slave (nó 1)
      - PGPOOL_SR_CHECK_USER=chat_admin
      - PGPOOL_SR_CHECK_PASSWORD=senha_secreta
      - PGPOOL_SR_CHECK_DATABASE=chat_db
      - PGPOOL_ENABLE_LOAD_BALANCE=yes                       # Ativa a divisão de leituras/escritas
    ports:
      - "5432:5432"                                           # Expõe a porta padrão do Postgres para a VM
    depends_on:
      - psql_01
      - psql_01_rr
    networks:
      - db_net
    restart: always

  # ==========================================
  # CAMADA DE AUTENTICAÇÃO (AUTHELIA)
  # ==========================================
  authelia:
    image: authelia/authelia:latest
    container_name: authelia_server
    volumes:
      - ./authelia-config:/config
    networks:
      - db_net   # Para falar com o Pgpool
      - web_net  # Para falar com o Nginx
    depends_on:
      - pgpool
    restart: always

  # ==========================================
  # CAMADA DE PROXY E LOAD BALANCER (NGINX)
  # ==========================================
  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx-config/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - web_net  # Totalmente isolado da rede interna de dados
    depends_on:
      - authelia
    restart: always

# ==========================================
# DEFINIÇÕES GLOBAIS DE REDES E VOLUMES
# ==========================================
networks:
  db_net:
    driver: bridge
  web_net:
    driver: bridge

volumes:
  psql_master_data:
  psql_replica_data: